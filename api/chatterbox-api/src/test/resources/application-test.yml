spring:
  application:
    name: chatterbox-api-test

api:
  prefix: /api

server:
  port: 8082

logging:
  level:
    root: INFO

common:
  logging:
    appender:
      file:
        location: /var/log/chatterbox-api

packages:
  separate:
    logging:
      level: za.co.psybergate.chatterbox

webhook:
  github:
    secret: secret
    # todo move to package
    payload: "{\"hello\":\"world\",\"repository\": {\"full_name\": \"psyAlexBlakeGoudemond/chatterbox\"}, \"sender\": {\"login\": \"psyAlexBlakeGoudemond\"}, \"issue\": {\"html_url\": \"http://localhost:abcd\"}, \"head_commit\": {\"message\": \"Test message Is here!\"}}"
chatterbox:
  github-repositories-accepted:
    - Psybergate-Knowledge-Repository/mentoring_software_foundations
    - psyAlexBlakeGoudemond/chatterbox
  teams-destinations-accepted:
    - channelName: "General"
      webhookUrl: "https://outlook.office.com/webhook/..."
    - channelName: "TestChannel"
      webhookUrl: "https://outlook.office.com/webhook/..."
  github-incoming-mappings:
    push:
      displayName: "Push Event"
      fields:
        repositoryName: "repository.full_name"
        senderName: "sender.login"
        url: "issue.html_url"
        urlDisplayText: "head_commit.message"
