spring:
  application:
    name: chatterbox-api-test

  # Allows for ANSI additions, particularly to the banner.txt
  output:
    ansi:
      enabled: ALWAYS
  banner:
    location: banners-coloured/banner-chatterbox-test-colour-001.txt
  datasource:
    username: user
    password: password
    url: jdbc:postgresql://localhost:54321/chatterbox
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none   # or update / none / create-drop
    show-sql: true

server:
  port: 8082

logging:
  level:
    root: INFO
    org.springframework.boot.autoconfigure.jdbc: DEBUG


management:
  endpoints:
    web:
      exposure:
        include: health

common:
  logging:
    appender:
      file:
        location: /var/log/chatterbox-api

packages:
  separate:
    logging:
      level: za.co.psybergate.chatterbox

chatterbox:
  sources:
    github:
      repository:
        destination-mapping:
          - name: Psybergate-Knowledge-Repository/mentoring_software_foundations
            teamsDestinationChannel: TestChannel
          - name: psyAlexBlakeGoudemond/chatterbox
            teamsDestinationChannel: TestChannel
      payload:
        event-mapping:
          push:
            displayName: "Push Event"
            fields:
              repositoryName: "repository.full_name"
              senderName: "sender.login"
              url: "issue.html_url"
              urlDisplayText: "head_commit.message"
  destinations:
    teams:
      accepted-channel:
        - channelName: "General"
          webhookUrl: "https://outlook.office.com/webhook/..."
        - channelName: "TestChannel"
          webhookUrl: "https://outlook.office.com/webhook/..."
  deliveries:
    teams:
      adaptive-card-definition:
        type: "message"
        attachments:
          - contentType: "application/vnd.microsoft.card.adaptive"
            content:
              type: "AdaptiveCard"
              version: "1.0"
              msteams:
                width: Full
              body:
                - type: "TextBlock"
                  text: "📢 ${displayName} for ${repositoryName}"
                  wrap: true
                - type: "TextBlock"
                  text: "⁉️ Details: [${urlDisplayText}](${url}) created by ${senderName}"
                  wrap: true
  security:
    webhook:
      github:
        secret: secret
    api:
      github:
        token: "github_pat_123abc"
  api:
    prefix: /api