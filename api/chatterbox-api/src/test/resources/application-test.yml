spring:
  application:
    name: chatterbox-api-test

  # Allows for ANSI additions, particularly to the banner.txt
  output:
    ansi:
      enabled: ALWAYS
  banner:
    location: banners-coloured/banner-chatterbox-test-colour-001.txt

server:
  port: 8082

logging:
  level:
    root: INFO

management:
  endpoints:
    web:
      exposure:
        include: health

common:
  logging:
    appender:
      file:
        location: /var/log/chatterbox-api

packages:
  separate:
    logging:
      level: za.co.psybergate.chatterbox

chatterbox:
  source:
    github:
      repository:
        destination-mappings:
          - name: Psybergate-Knowledge-Repository/mentoring_software_foundations
            destinationChannel: TestChannel
          - name: psyAlexBlakeGoudemond/chatterbox
            destinationChannel: TestChannel
      payload:
        event-mappings:
          push:
            displayName: "Push Event"
            fields:
              repositoryName: "repository.full_name"
              senderName: "sender.login"
              url: "issue.html_url"
              urlDisplayText: "head_commit.message"
  destination:
    teams:
      channels-accepted:
        - channelName: "General"
          webhookUrl: "https://outlook.office.com/webhook/..."
        - channelName: "TestChannel"
          webhookUrl: "https://outlook.office.com/webhook/..."
  delivery:
    teams:
      templates:
        card:
          adaptive:
            type: "message"
            attachments:
              - contentType: "application/vnd.microsoft.card.adaptive"
                content:
                  type: "AdaptiveCard"
                  version: "1.0"
                  msteams:
                    width: Full
                  body:
                    - type: "TextBlock"
                      text: "📢 ${displayName} for ${repositoryName}"
                      wrap: true
                    - type: "TextBlock"
                      text: "⁉️ Details: [${urlDisplayText}](${url}) created by ${senderName}"
                      wrap: true
  security:
    webhook:
      github:
        secret: secret
  api:
    prefix: /api