spring:
  application:
    name: chatterbox-api

  # Allows for ANSI additions, particularly to the banner.txt
  output:
    ansi:
      enabled: ALWAYS
  banner:
    location: banners-coloured/banner-chatterbox-colour-003.txt
  datasource:
    username: user
    password: password
    url: jdbc:postgresql://localhost:55618/chatterbox
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      max-lifetime: 30000 # 30s; reduces the chance Hikari validates closed connections on shutdown
      idle-timeout: 10000 # 10s
      connection-test-query: SELECT 1
      health-check-properties:
        connectivityCheckTimeout: 1
      leak-detection-threshold: 0
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none   # or update / none / create-drop
    show-sql: true
    properties:
      hibernate.format_sql: true

common:
  logging:
    appender:
      file:
        location: /var/log/chatterbox-api

server:
  port: 1234
  address: 0.0.0.0   # must be 0.0.0.0 for Docker networking

logging:
  level:
    root: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: "never"
    prometheus:
      access: unrestricted

packages:
  separate:
    logging:
      level: com.webhook.relay.chatterbox

chatterbox:
  polled-event-executor:
    thread-count: 1
    max-pool-size: 1
    queue-capacity: 10
    thread-name-prefix: "polled-event-"
  webhook-event-executor:
    thread-count: 1
    max-pool-size: 1
    queue-capacity: 10
    thread-name-prefix: "webhook-event-"
  sources:
    github:
      repository:
        destination-mapping:
          - source: Psybergate-Knowledge-Repository/mentoring_software_foundations
            destinationChannels:
              NOTIFICATION: TestChannel
              CHAT: General
          - source: psyAlexBlakeGoudemond/chatterbox
            destinationChannels:
              NOTIFICATION: TestChannel
              CHAT: General
      payload:
        event-mapping:
          #          push:
          #            displayName: "Push Event"
          #            fields:
          #              repositoryName: "repository.full_name"
          #              senderName: "sender.login"
          #              url: "compare"
          #              urlDisplayText: "head_commit.message"
          #              extraDetail: "repository.name"
          pull_request:
            displayName: "Pull Request Event"
            fields:
              REPOSITORYNAME: "repository.full_name"
              SENDERNAME: "pull_request.user.login"
              URL: "pull_request.html_url"
              URLDISPLAYTEXT: "pull_request.title"
              EXTRADETAIL: "action"
          #          poll_commit:
          #            displayName: "Commit Event"
          #            fields:
          #              REPOSITORYNAME: "full_name"
          #              SENDERNAME: "commit.author.name"
          #              URL: "commit.url"
          #              URLDISPLAYTEXT: "commit.message"
          #              EXTRADETAIL: "full_name"
          poll_pull_request:
            displayName: "Pull Request Event"
            fields:
              REPOSITORYNAME: "full_name"
              SENDERNAME: "user.login"
              URL: "html_url"
              URLDISPLAYTEXT: "title"
              EXTRADETAIL: "state"
          ping:
            displayName: "Ping Event"
            fields:
              REPOSITORYNAME: "repository.full_name"
              SENDERNAME: "sender.login"
              URL: "hook.ping_url"
              URLDISPLAYTEXT: "zen"
              EXTRADETAIL: "hook.name"
  destinations:
    teams:
      accepted-channel:
        - channelName: "General"
          webhookUrl: "https://outlook.office.com/webhook/..."
        - channelName: "TestChannel"
          webhookUrl: "https://outlook.office.com/webhook/..."
    discord:
      accepted-channel:
        - channelName: "General"
          webhookUrl: "https://discord.com/api/webhooks/..."
  deliveries:
    teams:
      adaptive-card-definition:
        type: "message"
        attachments:
          - contentType: "application/vnd.microsoft.card.adaptive"
            content:
              type: "AdaptiveCard"
              version: "1.0"
              msteams:
                width: Full
              body:
                - type: "TextBlock"
                  text: "📢 ${displayName} (${extraDetail}) for ${repositoryName}"
                  wrap: true
                - type: "TextBlock"
                  text: "⁉️ Details: [${urlDisplayText}](${url}) created by ${senderName}"
                  wrap: true
    discord:
      embedded-object-definition:
        embeds:
          - title: "${urlDisplayText}"
            description: "📢 ${displayName} (${extraDetail}) for ${repositoryName}"
            url: "${url}"
            color: 6993
            author:
              name: "${senderName}"
              icon_url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
  security:
    webhook:
      github:
        secret: secret
    api:
      github:
        token: "github_pat_123abc"
  api:
    prefix: /api
    polledEventToleranceInSeconds: 5
