spring:
  application:
    name: chatterbox-api

  # Allows for ANSI additions, particularly to the banner.txt
  output:
    ansi:
      enabled: ALWAYS
  banner:
    location: banners-coloured/banner-chatterbox-colour-002.txt

api:
  prefix: /api

common:
  logging:
    appender:
      file:
        location: /var/log/chatterbox-api

server:
  port: 1234
  address: 0.0.0.0   # must be 0.0.0.0 for Docker networking

logging:
  level:
    root: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: "never"
    prometheus:
      access: unrestricted

packages:
  separate:
    logging:
      level: za.co.psybergate.chatterbox

webhook:
  github:
    secret: secret
chatterbox:
  github-repositories-accepted:
    - name: Psybergate-Knowledge-Repository/mentoring_software_foundations
      destinationChannel: TestChannel
    - name: psyAlexBlakeGoudemond/chatterbox
      destinationChannel: TestChannel
  teams-destinations-accepted:
    - channelName: "General"
      webhookUrl: "https://outlook.office.com/webhook/..."
    - channelName: "TestChannel"
      webhookUrl: "https://outlook.office.com/webhook/..."
  github-incoming-mappings:
    push:
      displayName: "Push Event"
      fields:
        repositoryName: "repository.full_name"
        senderName: "sender.login"
        url: "compare"
        urlDisplayText: "head_commit.message"
      destinations:
        - "TestChannel"
    pull_request:
      displayName: "Pull Request Event"
      fields:
        repositoryName: "repository.full_name"
        senderName: "pull_request.user.login"
        url: "pull_request.html_url"
        urlDisplayText: "pull_request.title"
      destinations:
        - "TestChannel"
teams-card-template:
  adaptive-card:
    attachments:
      - content:
          msteams:
            width: Full
          body:
            - text: "📢 ${displayName} for ${repositoryName}"
            - text: "⁉️ Details: [${urlDisplayText}](${url}) created by ${senderName}"
