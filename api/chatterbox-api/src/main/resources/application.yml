spring:
  application:
    name: chatterbox-api

  # Allows for ANSI additions, particularly to the banner.txt
  output:
    ansi:
      enabled: ALWAYS
  banner:
    location: banners-coloured/banner-chatterbox-colour-003.txt

common:
  logging:
    appender:
      file:
        location: /var/log/chatterbox-api

server:
  port: 1234
  address: 0.0.0.0   # must be 0.0.0.0 for Docker networking

logging:
  level:
    root: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: "never"
    prometheus:
      access: unrestricted

packages:
  separate:
    logging:
      level: za.co.psybergate.chatterbox

chatterbox:
  source:
    github:
      repository:
        destination-mappings:
          - name: Psybergate-Knowledge-Repository/mentoring_software_foundations
            destinationChannel: TestChannel
          - name: psyAlexBlakeGoudemond/chatterbox
            destinationChannel: TestChannel
      payload:
        event-mappings:
          push:
            displayName: "Push Event"
            fields:
              repositoryName: "repository.full_name"
              senderName: "sender.login"
              url: "issue.html_url"
              urlDisplayText: "head_commit.message"
  destination:
    teams:
      channels-accepted:
        - channelName: "General"
          webhookUrl: "https://outlook.office.com/webhook/..."
        - channelName: "TestChannel"
          webhookUrl: "https://outlook.office.com/webhook/..."
  delivery:
    teams:
      adaptive-card-template:
        type: "message"
        attachments:
          - contentType: "application/vnd.microsoft.card.adaptive"
            content:
              type: "AdaptiveCard"
              version: "1.0"
              msteams:
                width: Full
              body:
                - type: "TextBlock"
                  text: "📢 ${displayName} for ${repositoryName}"
                  wrap: true
                - type: "TextBlock"
                  text: "⁉️ Details: [${urlDisplayText}](${url}) created by ${senderName}"
                  wrap: true
  security:
    webhook:
      github:
        secret: secret
  api:
    prefix: /api
