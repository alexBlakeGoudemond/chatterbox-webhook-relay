# HTTPS server for normal clients (optional)
server {
    listen 443 ssl;
    server_name chatterbox;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    # Optional best practice
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location / {
        return 501 "Endpoint not implemented yet";
    }
}

# HTTP server for LocalTunnel
server {
    listen 80;
    server_name chatterbox;

    # Directly proxy webhook POSTs to backend, do NOT redirect
    location /chatterbox/github {
        proxy_pass http://chatterbox:8082/api/webhook/github;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Hub-Signature $http_x_hub_signature;
        proxy_set_header X-Hub-Signature-256 $http_x_hub_signature_256;
    }

    # Optional: redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}
